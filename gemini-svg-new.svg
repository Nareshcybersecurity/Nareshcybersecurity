<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="50">
  <style>
    .text {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 11px;
      font-weight: 500;
      fill: #e2e8f0; /* Default light text for the dark background */
      letter-spacing: 0.08em;
    }
    .star {
      fill: #10b981; /* Replaces var(--green) */
    }
  </style>

  <!-- Added a Solid, Saturated Rich Cyan Background Color Layer -->
  <rect width="100%" height="100%" fill="#0a192f" /> <!-- A solid, rich deep cyan-black -->

  <!-- Original Background (as a semi-transparent overlay to provide depth) -->
  <rect width="100%" height="100%" fill="rgba(5, 7, 18, 0.4)" />

  <!-- Borders (simulating 1px solid var(--line)) -->
  <line x1="0" y1="0.5" x2="100%" y2="0.5" stroke="rgba(255, 255, 255, 0.15)" stroke-width="1" />
  <line x1="0" y1="49.5" x2="100%" y2="49.5" stroke="rgba(255, 255, 255, 0.15)" stroke-width="1" />

  <!-- Animated Track -->
  <g>
    <animateTransform 
      attributeName="transform" 
      type="translate" 
      from="0 0" 
      to="-1500 0" 
      dur="30s" 
      repeatCount="indefinite" 
    />

    <!-- The text sequence is duplicated three times (0, 1500, 3000) to ensure the loop doesn't break even on ultra-wide screens -->
    <text x="0" y="29.5" textLength="1500" lengthAdjust="spacing" class="text">LINUX&#160;&#160;&#160;&#160;<tspan class="star">✦</tspan>&#160;&#160;&#160;&#160;AWS&#160;&#160;&#160;&#160;<tspan class="star">✦</tspan>&#160;&#160;&#160;&#160;BASH&#160;&#160;&#160;&#160;<tspan class="star">✦</tspan>&#160;&#160;&#160;&#160;KUBERNETES&#160;&#160;&#160;&#160;<tspan class="star">✦</tspan>&#160;&#160;&#160;&#160;TERRAFORM&#160;&#160;&#160;&#160;<tspan class="star">✦</tspan>&#160;&#160;&#160;&#160;DOCKER&#160;&#160;&#160;&#160;<tspan class="star">✦</tspan>&#160;&#160;&#160;&#160;ANSIBLE&#160;&#160;&#160;&#160;<tspan class="star">✦</tspan>&#160;&#160;&#160;&#160;GITHUB ACTIONS&#160;&#160;&#160;&#160;<tspan class="star">✦</tspan>&#160;&#160;&#160;&#160;PROMETHEUS&#160;&#160;&#160;&#160;<tspan class="star">✦</tspan>&#160;&#160;&#160;&#160;GRAFANA&#160;&#160;&#160;&#160;<tspan class="star">✦</tspan>&#160;&#160;&#160;&#160;ELK STACK&#160;&#160;&#160;&#160;<tspan class="star">✦</tspan>&#160;&#160;&#160;&#160;PYTHON&#160;&#160;&#160;&#160;<tspan class="star">✦</tspan>&#160;&#160;&#160;&#160;</text>

    <text x="1500" y="29.5" textLength="1500" lengthAdjust="spacing" class="text">LINUX&#160;&#160;&#160;&#160;<tspan class="star">✦</tspan>&#160;&#160;&#160;&#160;AWS&#160;&#160;&#160;&#160;<tspan class="star">✦</tspan>&#160;&#160;&#160;&#160;BASH&#160;&#160;&#160;&#160;<tspan class="star">✦</tspan>&#160;&#160;&#160;&#160;KUBERNETES&#160;&#160;&#160;&#160;<tspan class="star">✦</tspan>&#160;&#160;&#160;&#160;TERRAFORM&#160;&#160;&#160;&#160;<tspan class="star">✦</tspan>&#160;&#160;&#160;&#160;DOCKER&#160;&#160;&#160;&#160;<tspan class="star">✦</tspan>&#160;&#160;&#160;&#160;ANSIBLE&#160;&#160;&#160;&#160;<tspan class="star">✦</tspan>&#160;&#160;&#160;&#160;GITHUB ACTIONS&#160;&#160;&#160;&#160;<tspan class="star">✦</tspan>&#160;&#160;&#160;&#160;PROMETHEUS&#160;&#160;&#160;&#160;<tspan class="star">✦</tspan>&#160;&#160;&#160;&#160;GRAFANA&#160;&#160;&#160;&#160;<tspan class="star">✦</tspan>&#160;&#160;&#160;&#160;ELK STACK&#160;&#160;&#160;&#160;<tspan class="star">✦</tspan>&#160;&#160;&#160;&#160;PYTHON&#160;&#160;&#160;&#160;<tspan class="star">✦</tspan>&#160;&#160;&#160;&#160;</text>

    <text x="3000" y="29.5" textLength="1500" lengthAdjust="spacing" class="text">LINUX&#160;&#160;&#160;&#160;<tspan class="star">✦</tspan>&#160;&#160;&#160;&#160;AWS&#160;&#160;&#160;&#160;<tspan class="star">✦</tspan>&#160;&#160;&#160;&#160;BASH&#160;&#160;&#160;&#160;<tspan class="star">✦</tspan>&#160;&#160;&#160;&#160;KUBERNETES&#160;&#160;&#160;&#160;<tspan class="star">✦</tspan>&#160;&#160;&#160;&#160;TERRAFORM&#160;&#160;&#160;&#160;<tspan class="star">✦</tspan>&#160;&#160;&#160;&#160;DOCKER&#160;&#160;&#160;&#160;<tspan class="star">✦</tspan>&#160;&#160;&#160;&#160;ANSIBLE&#160;&#160;&#160;&#160;<tspan class="star">✦</tspan>&#160;&#160;&#160;&#160;GITHUB ACTIONS&#160;&#160;&#160;&#160;<tspan class="star">✦</tspan>&#160;&#160;&#160;&#160;PROMETHEUS&#160;&#160;&#160;&#160;<tspan class="star">✦</tspan>&#160;&#160;&#160;&#160;GRAFANA&#160;&#160;&#160;&#160;<tspan class="star">✦</tspan>&#160;&#160;&#160;&#160;ELK STACK&#160;&#160;&#160;&#160;<tspan class="star">✦</tspan>&#160;&#160;&#160;&#160;PYTHON&#160;&#160;&#160;&#160;<tspan class="star">✦</tspan>&#160;&#160;&#160;&#160;</text>
  </g>
</svg>
